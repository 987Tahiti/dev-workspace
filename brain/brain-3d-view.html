<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vue 3D du cerveau</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
    #overlay {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 14px 18px;
      border-radius: 12px;
      max-width: 320px;
      line-height: 1.5;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }
    #overlay h1 { margin: 0 0 10px; font-size: 22px; }
    #overlay p { margin: 6px 0; }
    #info { margin-top: 12px; }
    #hint {
      position: absolute;
      bottom: 16px;
      left: 16px;
      color: #ddd;
      font-size: 13px;
      background: rgba(0,0,0,0.5);
      padding: 10px 12px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>Vue 3D du cerveau</h1>
    <p>Interaction entre :</p>
    <ul>
      <li>Skills</li>
      <li>Agents</li>
      <li>IA</li>
      <li>Projets</li>
    </ul>
    <div id="info"><strong>Sélection :</strong> cliquez sur un nœud</div>
  </div>
  <div id="hint">Rotation : clic gauche + glisser, Zoom : molette, Pan : clic droit</div>

  <script src="https://unpkg.com/three@0.154.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.154.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1120);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 20, 40);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const pointLight = new THREE.PointLight(0xffffff, 1.2);
    pointLight.position.set(50, 50, 50);
    scene.add(pointLight);

    const nodes = [
      { id: 'Cerveau', label: 'Cerveau', color: 0xffb703, position: [0, 0, 0], size: 2.8, type: 'core' },
      { id: 'Skills', label: 'Skills', color: 0x8ecae6, position: [-12, 8, 0], size: 1.8, type: 'skill' },
      { id: 'Agents', label: 'Agents', color: 0xfb8500, position: [12, 8, 0], size: 1.8, type: 'agent' },
      { id: 'IA', label: 'IA', color: 0xcdb4db, position: [0, 12, 12], size: 1.8, type: 'ia' },
      { id: 'Android', label: 'Android', color: 0x06d6a0, position: [-18, -6, -4], size: 1.4, type: 'project' },
      { id: 'Web', label: 'Web', color: 0x118ab2, position: [0, -10, 6], size: 1.4, type: 'project' },
      { id: 'Windows', label: 'Windows', color: 0x073b4c, position: [18, -6, -4], size: 1.4, type: 'project' },
      { id: 'GitHub', label: 'GitHub', color: 0x212121, position: [-14, 2, 12], size: 1.2, type: 'tool' },
      { id: 'VSCode', label: 'VS Code', color: 0x4f5b93, position: [14, 2, 12], size: 1.2, type: 'tool' },
      { id: 'Node', label: 'Node.js', color: 0x7cbe00, position: [-8, -12, -12], size: 1.2, type: 'tool' },
      { id: 'DotNet', label: '.NET', color: 0x5f0f40, position: [8, -12, -12], size: 1.2, type: 'tool' },
      { id: 'OpenAI', label: 'OpenAI', color: 0x81b29a, position: [6, 16, 0], size: 1.4, type: 'ia' },
      { id: 'Claude', label: 'Claude', color: 0xef476f, position: [-6, 16, 0], size: 1.4, type: 'ia' },
      { id: 'Gemini', label: 'Gemini', color: 0x118ab2, position: [0, 16, -8], size: 1.4, type: 'ia' }
    ];

    const edges = [
      ['Cerveau','Skills'], ['Cerveau','Agents'], ['Cerveau','IA'],
      ['Cerveau','Android'], ['Cerveau','Web'], ['Cerveau','Windows'],
      ['Skills','Agents'], ['Skills','IA'], ['Agents','IA'],
      ['Agents','GitHub'], ['Agents','VSCode'], ['Agents','OpenAI'], ['Agents','Claude'], ['Agents','Gemini'],
      ['IA','OpenAI'], ['IA','Claude'], ['IA','Gemini'],
      ['Android','Node'], ['Web','Node'], ['Windows','DotNet'],
      ['GitHub','VSCode'], ['GitHub','Node'], ['VSCode','DotNet']
    ];

    const nodeObjects = {};
    const labelDiv = document.createElement('div');
    labelDiv.style.position = 'absolute';
    labelDiv.style.color = '#ffffff';
    labelDiv.style.pointerEvents = 'none';
    document.body.appendChild(labelDiv);

    const sphereGeometry = new THREE.SphereGeometry(1, 32, 32);
    nodes.forEach(node => {
      const material = new THREE.MeshStandardMaterial({ color: node.color, emissive: node.color, emissiveIntensity: 0.2, transparent: true, opacity: 0.95 });
      const mesh = new THREE.Mesh(sphereGeometry, material);
      mesh.position.set(...node.position);
      mesh.scale.setScalar(node.size);
      mesh.userData = node;
      scene.add(mesh);
      nodeObjects[node.id] = mesh;

      const spriteMaterial = new THREE.SpriteMaterial({
        map: createTextTexture(node.label, node.color),
        transparent: true,
        sizeAttenuation: true
      });
      const sprite = new THREE.Sprite(spriteMaterial);
      sprite.scale.set(node.label.length * 0.4, 1, 1);
      sprite.position.copy(mesh.position).add(new THREE.Vector3(0, node.size + 0.6, 0));
      scene.add(sprite);
    });

    function createTextTexture(text, color) {
      const canvas = document.createElement('canvas');
      const size = 512;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(0,0,0,0)';
      ctx.fillRect(0, 0, size, size);
      ctx.font = 'bold 62px Arial';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, size / 2, size / 2);
      const texture = new THREE.CanvasTexture(canvas);
      return texture;
    }

    edges.forEach(([source, target]) => {
      const p1 = nodeObjects[source].position;
      const p2 = nodeObjects[target].position;
      const geometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
      const material = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
      const line = new THREE.Line(geometry, material);
      scene.add(line);
    });

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let selected = null;

    function onMouseMove(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    function onClick(event) {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(Object.values(nodeObjects));
      if (intersects.length > 0) {
        const node = intersects[0].object.userData;
        selected = intersects[0].object;
        document.getElementById('info').innerHTML = `<strong>Selection :</strong> ${node.label} <br><strong>Type :</strong> ${node.type}`;
        highlightNode(selected);
      }
    }

    function highlightNode(mesh) {
      Object.values(nodeObjects).forEach(obj => {
        obj.material.opacity = 0.95;
        obj.material.emissiveIntensity = 0.2;
      });
      if (mesh) {
        mesh.material.opacity = 1;
        mesh.material.emissiveIntensity = 0.8;
      }
    }

    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('click', onClick);
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
